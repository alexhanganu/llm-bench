# llm-bench model configuration
# Mirrors the Python registry but in YAML for community contributions.
# Add a new model here and run: llm-bench registry sync

models:

  llama-3.1-8b:
    name: "Llama 3.1 8B Instruct"
    family: llama
    developer: Meta
    params: "8B"
    context: 128000
    hf_repo: "meta-llama/Llama-3.1-8B-Instruct"
    gguf_repo: "bartowski/Meta-Llama-3.1-8B-Instruct-GGUF"
    gguf_file: "Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf"
    min_vram_gb:
      fp16: 16
      8bit: 8
      4bit: 6
    license: "Llama 3.1 Community License"
    strengths: [general, reasoning, coding]
    tags: [popular, fast]

  qwen2.5-7b:
